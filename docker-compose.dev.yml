services:
  db:
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: build
    container_name: netflix-server-dev
    command: npm run dev
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    environment:
      PORT: 5000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/netflix_db?schema=public
      CORS_ORIGIN: http://localhost:3000

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: build
    container_name: netflix-client-dev
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:5000
